name: Deploy Makuro Coming Soon (Production)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check authorized deployer
        run: |
          if [ "${{ github.actor }}" != "${{ secrets.GHCR_USERNAME }}" ] && \
             [ "${{ github.actor }}" != "${{ secrets.GHCR_USERNAME_ALT }}" ]; then
            echo "❌ Unauthorized deployer: ${{ github.actor }} is not allowed to deploy to production."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set deployment variables
        run: |
          VERSION=${GITHUB_REF##*/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CI_IMAGE_NAME=ghcr.io/${{ secrets.GHCR_USERNAME }}/makuro-coming-soon:$VERSION" >> $GITHUB_ENV

      - name: Build & Push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.CI_IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS (Makuro Coming Soon Production)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BD_VPS_IP }}
          username: ${{ secrets.BD_VPS_USER }}
          key: ${{ secrets.BD_VPS_SSH_KEY }}
          script: |
            DEPLOY_DIR="/home/${{ secrets.BD_VPS_USER }}/makuro-coming-soon-production"
            VERSION="${{ env.VERSION }}"

            echo "Creating and entering deployment directory..."
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "Cloning docker-compose.yml from repo..."
            TMP_DIR=$(mktemp -d)
            git clone --branch "$VERSION" --depth 1 git@github.com:${{ github.repository }} "$TMP_DIR"
            cp "$TMP_DIR/docker-compose.yml" ./docker-compose.yml
            rm -rf "$TMP_DIR"

            # Create .env
            cat > .env << EOF
            NODE_ENV=production
            APP_PORT=${{ secrets.APP_PORT }}
            DATA_DIR=/app/data
            CI_IMAGE_NAME="${{ env.CI_IMAGE_NAME }}"
            EOF

            # Override docker-compose.yml to use the GHCR image
            sed -i "s|build: \.|image: ${CI_IMAGE_NAME}|g" docker-compose.yml
            sed -i '/build:/d' docker-compose.yml

            echo "Authenticating with GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "Stopping and removing old container..."
            sudo docker compose down || true
            sudo docker image prune -a -f || true

            echo "Pulling and starting new container..."
            sudo docker compose pull
            sudo docker compose up -d

            echo "Logging out from GHCR..."
            sudo docker logout ghcr.io

            echo "Deployment to production completed."
